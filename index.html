<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D打印创客课程 - 演示演示课件</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 导航侧边栏 -->
        <nav id="sidebar">
            <div class="logo">
                <span class="logo-icon">💠</span>
                <span class="logo-text">3D Maker</span>
            </div>
            <div class="grade-selector">
                <button class="btn-grade active" data-grade="g3">3年级</button>
                <button class="btn-grade" data-grade="g8">8年级</button>
            </div>
            <ul id="lesson-list">
                <!-- 动态加载课时列表 -->
            </ul>
        </nav>

        <!-- 主内容区 (幻灯片容器) -->
        <main id="presentation-container">
            <div id="slides-viewport">
                <!-- 动态加载幻灯片 -->
                <div class="slide active" id="slide-welcome">
                    <div class="content">
                        <h1 class="animate-text">欢迎开启<br><span class="highlight">3D创造之旅</span></h1>
                        <p class="subtitle">探索无限可能，将想象变为现实</p>
                        <div class="visual-placeholder">
                            <div class="cube-animation"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="controls">
                <button id="prev-btn" class="ctrl-btn">←</button>
                <div id="slide-indicator">1 / 1</div>
                <button id="next-btn" class="ctrl-btn">→</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
